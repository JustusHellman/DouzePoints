<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ad</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const key = urlParams.get('key');
    const width = parseInt(urlParams.get('width') || '0', 10);
    const height = parseInt(urlParams.get('height') || '0', 10);

    if (key && width && height) {
      window.atOptions = {
        'key': key,
        'format': 'iframe',
        'height': height,
        'width': width,
        'params': {}
      };
      document.write('<scr' + 'ipt type="text/javascript" src="//www.highperformanceformat.com/' + key + '/invoke.js"></scr' + 'ipt>');
    }
  </script>
</body>
</html>
